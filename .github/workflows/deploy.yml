name: Deploy Strapi to Fargate

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      TF_VAR_vpc_id: ${{ secrets.VPC_ID }}

    steps:
      # 1️⃣ Checkout the code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Configure AWS credentials
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 3️⃣ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 4️⃣ Terraform Init & Apply (Infrastructure)
      - name: Terraform Init & Apply
        run: |
          cd terraform
          terraform init -reconfigure
          terraform apply -auto-approve -var="image_url=dummy"

      # 5️⃣ Login to ECR
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 6️⃣ Build and Push Docker Image
      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/ahmad-ecs-task:$IMAGE_TAG ./strapi
          docker push $ECR_REGISTRY/ahmad-ecs-task:$IMAGE_TAG

      # 7️⃣ Update ECS Task with Real Image
      - name: Update ECS Task with Real Image
        run: |
          cd terraform
          terraform apply -auto-approve -var="image_url=${{ steps.login-ecr.outputs.registry }}/ahmad-ecs-task:${{ github.sha }}"